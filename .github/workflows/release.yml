name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3)'
        required: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Create and push tag
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download selfie_segmenter.tflite model
        shell: pwsh
        run: |
          curl -L -o selfie_segmenter.tflite `
            "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite"

      - name: Build with PyInstaller
        run: pyinstaller camera_effects.spec --clean --noconfirm

      - name: Package release zip
        shell: pwsh
        run: |
          $version  = "${{ inputs.version }}"
          $zipName  = "Camera-Effects-$version-windows-x64.zip"
          Compress-Archive -Path dist\CameraEffects.exe, README.md -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ inputs.version }}
          name: "Camera Effects ${{ inputs.version }}"
          body: |
            ## Camera Effects ${{ inputs.version }}

            ### Installation
            1. Download `Camera-Effects-${{ inputs.version }}-windows-x64.zip`
            2. Extract and run `CameraEffects.exe` — no installation required.

            ### Requirements
            - Windows 10/11 x64
            - A webcam
          files: ${{ env.ZIP_NAME }}
